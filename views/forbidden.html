<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="robots" content="noindex,nofollow"/>
<title>403 — Access Denied</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Share+Tech+Mono&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#080b10;color:#4a6580;font-family:'Rajdhani',sans-serif;height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
.code{font-family:'Share Tech Mono',monospace;font-size:72px;color:#2d7dd2;line-height:1;letter-spacing:.1em;}
.msg{font-size:18px;letter-spacing:.15em;text-transform:uppercase;color:#4a6580;}
.sub{font-family:'Share Tech Mono',monospace;font-size:11px;color:#2a3a4a;margin-top:4px;letter-spacing:.1em;}
a{margin-top:20px;font-size:13px;color:#2d7dd2;text-decoration:none;letter-spacing:.1em;border:1px solid #1e2a38;padding:8px 20px;border-radius:3px;}
a:hover{border-color:#2d7dd2;}
</style>
</head>
<body>
  <div class="code">403</div>
  <div class="msg">Access Denied</div>
  <div class="sub">This incident has been logged // FORTUNA-III-ADMIN</div>
  <a href="/">← Return to login</a>
</body>
</html>
